name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - target: x86_64-pc-windows-msvc
            platform: windows-latest
            os: windows
            ext: dll
          # Linux
          - target: x86_64-unknown-linux-gnu
            platform: ubuntu-latest
            os: linux
            ext: so
          - target: aarch64-unknown-linux-gnu
            platform: ubuntu-latest
            os: linux
            ext: so
          # macOS
          - target: x86_64-apple-darwin
            platform: macos-latest
            os: macos
            ext: dylib
          - target: aarch64-apple-darwin
            platform: macos-latest
            os: macos
            ext: dylib

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.os }}" = "windows" ]; then
            cp target/${{ matrix.target }}/release/metrics.dll artifacts/
          elif [ "${{ matrix.os }}" = "macos" ]; then
            cp target/${{ matrix.target }}/release/libmetrics.dylib artifacts/metrics-${{ matrix.target }}.dylib
          else
            cp target/${{ matrix.target }}/release/libmetrics.so artifacts/metrics-${{ matrix.target }}.so
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.target }}
          path: artifacts/*

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
